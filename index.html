<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga With Serenity</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --accent:#22c55e;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  text-align:center;
  padding:40px 20px;
}

.logo{
  font-size:3rem;
  font-weight:700;
}

.tagline{
  color:var(--sub);
  margin-top:10px;
}

.hero{
  height:60vh;
  background:url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:10px;
}

.container{
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.title{
  font-weight:600;
}

.desc{
  font-size:0.85rem;
  color:var(--sub);
  margin-top:5px;
}

.btn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  background:var(--accent);
  color:#fff;
  border-radius:20px;
  cursor:pointer;
}

.chat-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  background:var(--accent);
  padding:12px 15px;
  border-radius:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">🧘 Yoga With Serenity</div>
  <div class="tagline">Balance Your Mind • Body • Soul</div>
</header>

<div class="hero">
  <h1>Find Peace Through Yoga</h1>
</div>

<div class="container">

<div class="card">
  <img src="https://images.unsplash.com/photo-1552196563-55cd4e45efb3">
  <div class="card-content">
    <div class="title">Beginner Yoga</div>
    <div class="desc">Perfect for starting your yoga journey.</div>
    <button class="btn">Join Now</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773">
  <div class="card-content">
    <div class="title">Advanced Yoga</div>
    <div class="desc">Improve flexibility and strength.</div>
    <button class="btn">Join Now</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1518611012118-f0c5d6a0e5c0">
  <div class="card-content">
    <div class="title">Meditation</div>
    <div class="desc">Relax your mind and reduce stress.</div>
    <button class="btn">Join Now</button>
  </div>
</div>

</div>

<div class="chat-btn" onclick="openChat()">💬</div>

<script>
let watsonInstance=null;
function openChat(){
  if(watsonInstance){watsonInstance.openWindow();}
}
</script>

<script>
  window.watsonAssistantChatOptions = {
    integrationID: "6b398c2e-280b-43f0-a8cd-b4ad6f10f588",
    region: "eu-de",
    serviceInstanceID: "2c90c288-4b73-4e39-8297-ad10bc4253c4",
    onLoad: async (instance) => { watsonInstance=instance; await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
